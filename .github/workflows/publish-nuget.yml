name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to NuGet?"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - uses: actions/checkout@v4

      # ✅ Setup .NET
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      # ✅ Restore
      - run: dotnet restore

      # ✅ Build
      - run: dotnet build --configuration Release --no-restore

      # ✅ ✅ Security Scan (FIRST)
      - name: Security Scan
        run: dotnet list package --vulnerable --include-transitive

      # ✅ ✅ Unit Tests (SECOND)
      - name: Run Unit Tests
        run: dotnet test --configuration Release --no-build

      # ✅ Extract version (SIMPLE ✅)
      - name: Extract Version
        id: version_step
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ✅ Pack
      - name: Pack
        run: |
          dotnet pack --configuration Release --no-build \
            -p:PackageVersion=${{ steps.version_step.outputs.version }} \
            -p:Version=${{ steps.version_step.outputs.version }} \
            -o ./nupkgs

      # ✅ Publish Mapper
      - name: Publish Mapper
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: |
          dotnet nuget push ./nupkgs/Transitio.Mapper*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ✅ Publish Dependency
      - name: Publish Dependency
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: |
          sleep 30
          dotnet nuget push ./nupkgs/Transitio.Dependency*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
      
      # ✅ Publish Validation
      - name: Publish Validation
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: |
          sleep 30
          dotnet nuget push ./nupkgs/Transitio.Validation*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ✅ Publish Mediator
      - name: Publish Mediator
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: |
          sleep 30
          dotnet nuget push ./nupkgs/Transitio.Mediator*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ✅ Publish Assertions
      - name: Publish Assertions
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: |
          sleep 30
          dotnet nuget push ./nupkgs/Transitio.Assertions*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ✅ GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_step.outputs.tag }}
          name: Transitio ${{ steps.version_step.outputs.tag }}
          files: ./nupkgs/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}